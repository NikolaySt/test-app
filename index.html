<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Auth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e2e8f0;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3ecf8e, #1a9e6e);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .logo-text span {
      color: #3ecf8e;
    }

    h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #3ecf8e;
      background: rgba(62, 207, 142, 0.08);
      box-shadow: 0 0 0 3px rgba(62, 207, 142, 0.15);
    }

    input::placeholder { color: #475569; }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3ecf8e, #1a9e6e);
      color: white;
      box-shadow: 0 4px 15px rgba(62, 207, 142, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(62, 207, 142, 0.4);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: #94a3b8;
      margin-top: 12px;
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      border-color: rgba(255,255,255,0.25);
    }

    .toggle-link {
      text-align: center;
      margin-top: 22px;
      font-size: 14px;
      color: #64748b;
    }

    .toggle-link button {
      background: none;
      border: none;
      color: #3ecf8e;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 0;
      margin-left: 4px;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .toggle-link button:hover { color: #5de0a5; }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 18px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .alert-success {
      background: rgba(62, 207, 142, 0.12);
      border: 1px solid rgba(62, 207, 142, 0.3);
      color: #6ee7b7;
    }

    .alert-warning {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #fcd34d;
    }

    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* Dashboard */
    .dashboard-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #3ecf8e, #1a9e6e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: white;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(62, 207, 142, 0.35);
    }

    .welcome-text {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .user-email {
      font-size: 14px;
      color: #64748b;
      word-break: break-all;
    }

    .info-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .info-row:last-child { border-bottom: none; }

    .info-label { color: #64748b; }
    .info-value { color: #e2e8f0; font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(62, 207, 142, 0.15);
      color: #3ecf8e;
      border: 1px solid rgba(62, 207, 142, 0.3);
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 20px 0;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .config-notice {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #fcd34d;
      line-height: 1.6;
    }

    .config-notice strong { display: block; margin-bottom: 6px; font-size: 14px; }
    .config-notice code {
      background: rgba(0,0,0,0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }

    @media (max-width: 480px) {
      body { align-items: flex-start; padding: 20px 16px; }
      .card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- React 18 via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script type="text/babel">
    // ─── CONFIGURATION ──────────────────────────────────────────────────────────
    // Replace these with your Supabase project credentials.
    // Find them at: https://supabase.com/dashboard → Project Settings → API
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    // ────────────────────────────────────────────────────────────────────────────

    const isConfigured =
      SUPABASE_URL !== 'YOUR_SUPABASE_URL' &&
      SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';

    const supabaseClient = isConfigured
      ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    const { useState, useEffect, useCallback } = React;

    // ─── HELPERS ────────────────────────────────────────────────────────────────
    function getInitial(email) {
      return email ? email[0].toUpperCase() : '?';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      return new Date(dateStr).toLocaleString();
    }

    // ─── CONFIG NOTICE ──────────────────────────────────────────────────────────
    function ConfigNotice() {
      return (
        <div className="config-notice">
          <strong>⚙️ Setup Required</strong>
          Open <code>index.html</code> and replace <code>YOUR_SUPABASE_URL</code> and{' '}
          <code>YOUR_SUPABASE_ANON_KEY</code> with your project credentials from the{' '}
          <a href="https://supabase.com/dashboard" target="_blank" style={{color:'#fbbf24'}}>
            Supabase Dashboard
          </a>{' '}
          → Project Settings → API.
        </div>
      );
    }

    // ─── ALERT ──────────────────────────────────────────────────────────────────
    function Alert({ type, message }) {
      if (!message) return null;
      const icons = { error: '✕', success: '✓', warning: '⚠' };
      return (
        <div className={`alert alert-${type}`}>
          <span className="alert-icon">{icons[type]}</span>
          <span>{message}</span>
        </div>
      );
    }

    // ─── AUTH FORM ──────────────────────────────────────────────────────────────
    function AuthForm() {
      const [mode, setMode] = useState('login'); // 'login' | 'signup'
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');

      const reset = () => { setError(''); setSuccess(''); };

      const toggleMode = () => {
        setMode(m => m === 'login' ? 'signup' : 'login');
        reset();
      };

      const validate = () => {
        if (!email.trim()) return 'Email is required.';
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return 'Enter a valid email address.';
        if (!password) return 'Password is required.';
        if (mode === 'signup' && password.length < 6) return 'Password must be at least 6 characters.';
        return null;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        reset();

        if (!isConfigured) {
          setError('Supabase is not configured. Please update the config in index.html.');
          return;
        }

        const validationError = validate();
        if (validationError) { setError(validationError); return; }

        setLoading(true);
        try {
          if (mode === 'signup') {
            const { data, error: err } = await supabaseClient.auth.signUp({ email, password });
            if (err) throw err;
            if (data?.user && !data.session) {
              setSuccess('Account created! Check your email to confirm your address before logging in.');
            }
            // If email confirmation is disabled, onAuthStateChange handles the redirect
          } else {
            const { error: err } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (err) throw err;
            // onAuthStateChange in App will update session state
          }
        } catch (err) {
          setError(err.message || 'An unexpected error occurred.');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="card">
          <div className="logo">
            <div className="logo-icon">S</div>
            <div className="logo-text">Supa<span>base</span></div>
          </div>

          {!isConfigured && <ConfigNotice />}

          <h2>{mode === 'login' ? 'Welcome back' : 'Create account'}</h2>
          <p className="subtitle">
            {mode === 'login'
              ? 'Sign in to your account to continue.'
              : 'Sign up to get started today.'}
          </p>

          <Alert type="error" message={error} />
          <Alert type="success" message={success} />

          <form onSubmit={handleSubmit} noValidate>
            <div className="form-group">
              <label htmlFor="email">Email address</label>
              <input
                id="email"
                type="email"
                placeholder="you@example.com"
                value={email}
                onChange={e => setEmail(e.target.value)}
                autoComplete="email"
                disabled={loading}
              />
            </div>

            <div className="form-group">
              <label htmlFor="password">Password</label>
              <input
                id="password"
                type="password"
                placeholder={mode === 'signup' ? 'Min. 6 characters' : '••••••••'}
                value={password}
                onChange={e => setPassword(e.target.value)}
                autoComplete={mode === 'login' ? 'current-password' : 'new-password'}
                disabled={loading}
              />
            </div>

            <button type="submit" className="btn btn-primary" disabled={loading}>
              {loading && <span className="spinner" />}
              {loading
                ? (mode === 'login' ? 'Signing in…' : 'Creating account…')
                : (mode === 'login' ? 'Sign In' : 'Create Account')}
            </button>
          </form>

          <div className="toggle-link">
            {mode === 'login' ? "Don't have an account?" : 'Already have an account?'}
            <button onClick={toggleMode} type="button">
              {mode === 'login' ? 'Sign Up' : 'Sign In'}
            </button>
          </div>
        </div>
      );
    }

    // ─── DASHBOARD ──────────────────────────────────────────────────────────────
    function Dashboard({ session }) {
      const [loading, setLoading] = useState(false);
      const user = session.user;

      const handleLogout = async () => {
        setLoading(true);
        await supabaseClient.auth.signOut();
        // onAuthStateChange in App handles clearing session
      };

      return (
        <div className="card">
          <div className="logo">
            <div className="logo-icon">S</div>
            <div className="logo-text">Supa<span>base</span></div>
          </div>

          <div className="dashboard-header">
            <div className="avatar">{getInitial(user.email)}</div>
            <div className="welcome-text">Welcome back!</div>
            <div className="user-email">{user.email}</div>
          </div>

          <div className="info-card">
            <div className="info-row">
              <span className="info-label">Status</span>
              <span className="info-value"><span className="badge">● Authenticated</span></span>
            </div>
            <div className="info-row">
              <span className="info-label">User ID</span>
              <span className="info-value" style={{fontSize:'12px', fontFamily:'monospace'}}>
                {user.id ? user.id.slice(0, 18) + '…' : '—'}
              </span>
            </div>
            <div className="info-row">
              <span className="info-label">Provider</span>
              <span className="info-value">{user.app_metadata?.provider || 'email'}</span>
            </div>
            <div className="info-row">
              <span className="info-label">Signed in</span>
              <span className="info-value" style={{fontSize:'12px'}}>
                {formatDate(session.access_token
                  ? new Date(
                      (JSON.parse(atob(session.access_token.split('.')[1]))).iat * 1000
                    ).toLocaleString()
                  : user.last_sign_in_at)}
              </span>
            </div>
          </div>

          <button
            className="btn btn-outline"
            onClick={handleLogout}
            disabled={loading}
          >
            {loading && <span className="spinner" style={{borderTopColor:'#94a3b8'}} />}
            {loading ? 'Signing out…' : '→ Sign Out'}
          </button>
        </div>
      );
    }

    // ─── APP (ROOT) ──────────────────────────────────────────────────────────────
    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!isConfigured) { setLoading(false); return; }

        // Check existing session on mount
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setLoading(false);
        });

        // Listen for auth state changes
        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange(
          (_event, session) => {
            setSession(session);
          }
        );

        return () => subscription.unsubscribe();
      }, []);

      if (loading) {
        return (
          <div style={{color:'#64748b', fontSize:'14px', display:'flex', alignItems:'center', gap:'10px'}}>
            <span className="spinner" style={{borderTopColor:'#3ecf8e', borderColor:'rgba(62,207,142,0.2)'}} />
            Loading…
          </div>
        );
      }

      return session ? <Dashboard session={session} /> : <AuthForm />;
    }

    // ─── RENDER ──────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
